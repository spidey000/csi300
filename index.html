<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Index Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #0f3460;
            --highlight: #e94560;
            --text: #eaeaea;
            --text-muted: #a0a0a0;
            --card-bg: #1f1f3a;
            --border: #2a2a4a;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--primary);
            color: var(--text);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid var(--border);
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--highlight), #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .date-display {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .currency-select {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        select, button {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        select:hover, button:hover {
            border-color: var(--highlight);
        }
        
        .tabs {
            display: flex;
            gap: 5px;
            margin: 20px 0;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }
        
        .tab-btn {
            padding: 12px 24px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            transition: all 0.2s;
        }
        
        .tab-btn:hover {
            color: var(--text);
            background: var(--card-bg);
        }
        
        .tab-btn.active {
            color: var(--highlight);
            background: var(--card-bg);
            border-bottom: 2px solid var(--highlight);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .index-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .index-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .index-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.2);
        }
        
        .index-name {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .index-symbol {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-bottom: 15px;
        }
        
        .index-price {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .index-change {
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .positive { color: #4ade80; }
        .negative { color: #f87171; }
        
        .index-details {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        
        .compare-section {
            padding: 20px 0;
        }
        
        .compare-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .compare-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: var(--card-bg);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .compare-checkbox:hover {
            background: var(--accent);
        }
        
        .compare-checkbox input {
            accent-color: var(--highlight);
        }
        
        .compare-results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .compare-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
        }
        
        .chart-container {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            height: 350px;
        }
        
        .export-section {
            padding: 20px 0;
        }
        
        .export-btn {
            background: var(--highlight);
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
        }
        
        .export-btn:hover {
            background: #ff6b6b;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        
        .error {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid #f87171;
            color: #f87171;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
        
        .success {
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid #4ade80;
            color: #4ade80;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            .tabs {
                overflow-x: auto;
            }
            .index-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Global Index Dashboard</h1>
            <div class="date-display" id="dateDisplay"></div>
        </header>
        
        <div class="controls">
            <div class="currency-select">
                <label>Currency:</label>
                <select id="currencySelect">
                    <option value="USD">USD ($)</option>
                    <option value="EUR">EUR (€)</option>
                </select>
            </div>
            <button onclick="refreshData()" class="refresh-btn">🔄 Refresh Data</button>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('dashboard')">📊 Dashboard</button>
            <button class="tab-btn" onclick="switchTab('compare')">⚖️ Compare</button>
            <button class="tab-btn" onclick="switchTab('export')">📥 Export</button>
        </div>
        
        <!-- Dashboard Tab -->
        <div id="dashboard" class="tab-content active">
            <div id="dashboardContent">
                <div class="loading">Loading index data...</div>
            </div>
        </div>
        
        <!-- Compare Tab -->
        <div id="compare" class="tab-content">
            <div class="compare-section">
                <h3>Select indexes to compare:</h3>
                <div class="compare-controls" id="compareCheckboxes"></div>
                <button onclick="compareSelected()" class="compare-btn">Compare Selected</button>
            </div>
            <div id="compareResults"></div>
            <div class="chart-container">
                <canvas id="compareChart"></canvas>
            </div>
        </div>
        
        <!-- Export Tab -->
        <div id="export" class="tab-content">
            <div class="export-section">
                <h3>Export Data</h3>
                <p>Download all index data as CSV file.</p>
                <button onclick="exportToCSV()" class="export-btn">📥 Download CSV</button>
                <div id="exportMessage"></div>
            </div>
        </div>
    </div>

    <script>
        // Index configurations
        const INDEXES = {
            '^GSPC': { name: 'S&P 500', currency: 'USD', country: '🇺🇸' },
            '^IBEX': { name: 'IBEX 35', currency: 'EUR', country: '🇪🇸' },
            '^FTSE': { name: 'FTSE 100', currency: 'GBP', country: '🇬🇧' },
            '^GDAXI': { name: 'DAX', currency: 'EUR', country: '🇩🇪' },
            '^N225': { name: 'Nikkei 225', currency: 'JPY', country: '🇯🇵' },
            '^DJI': { name: 'Dow Jones', currency: 'USD', country: '🇺🇸' },
            '^IXIC': { name: 'NASDAQ', currency: 'USD', country: '🇺🇸' },
            '^STOXX50E': { name: 'Euro Stoxx 50', currency: 'EUR', country: '🇪🇺' },
        };

        // Exchange rates to USD (base)
        const EXCHANGE_RATES = {
            'USD': 1.0,
            'EUR': 1.08,
            'GBP': 1.27,
            'JPY': 0.0067,
        };

        // CORS proxy (using AllOrigins)
        const CORS_PROXY = 'https://api.allorigins.win/raw?url=';

        let allData = [];
        let compareChart = null;
        let targetDate = '';

        // Calculate yesterday's date
        function getYesterdayDate() {
            const date = new Date();
            date.setDate(date.getDate() - 1);
            return date.toISOString().split('T')[0];
        }

        // Format date for display
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
        }

        // Initialize
        async function init() {
            targetDate = getYesterdayDate();
            document.getElementById('dateDisplay').textContent = `Data for: ${formatDate(targetDate)}`;
            await loadAllData();
            setupCompareCheckboxes();
        }

        // Fetch data for an index
        async function fetchIndexData(symbol) {
            const info = INDEXES[symbol];
            const url = `${CORS_PROXY}${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=5d`)}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.chart && data.chart.result && data.chart.result[0]) {
                    const result = data.chart.result[0];
                    const meta = result.meta;
                    const indicators = result.indicators?.quote?.[0];
                    
                    if (!indicators) return null;
                    
                    // Get the last available day
                    const closes = indicators.close;
                    const opens = indicators.open;
                    const highs = indicators.high;
                    const lows = indicators.low;
                    const volumes = indicators.volume;
                    
                    // Find the last non-null value
                    let lastIdx = closes.length - 1;
                    while (lastIdx >= 0 && (closes[lastIdx] === null || closes[lastIdx] === undefined)) {
                        lastIdx--;
                    }
                    
                    if (lastIdx < 0) return null;
                    
                    return {
                        symbol: symbol,
                        name: info.name,
                        country: info.country,
                        currency: info.currency,
                        close: closes[lastIdx] || 0,
                        open: opens[lastIdx] || 0,
                        high: highs[lastIdx] || 0,
                        low: lows[lastIdx] || 0,
                        volume: volumes[lastIdx] || 0,
                        previousClose: closes[lastIdx - 1] || closes[lastIdx] || 0,
                        date: targetDate,
                    };
                }
            } catch (error) {
                console.error(`Error fetching ${symbol}:`, error);
            }
            return null;
        }

        // Load all index data
        async function loadAllData() {
            const content = document.getElementById('dashboardContent');
            content.innerHTML = '<div class="loading">Loading index data...</div>';
            
            allData = [];
            
            for (const symbol of Object.keys(INDEXES)) {
                const data = await fetchIndexData(symbol);
                if (data) {
                    allData.push(data);
                } else {
                    // Add with zeros if fetch failed
                    allData.push({
                        symbol: symbol,
                        name: INDEXES[symbol].name,
                        country: INDEXES[symbol].country,
                        currency: INDEXES[symbol].currency,
                        close: 0, open: 0, high: 0, low: 0, volume: 0,
                        previousClose: 0, date: targetDate,
                    });
                }
            }
            
            renderDashboard();
        }

        // Convert currency
        function convertCurrency(value, fromCurrency, toCurrency) {
            if (fromCurrency === toCurrency) return value;
            const usdValue = value / EXCHANGE_RATES[fromCurrency];
            return usdValue * EXCHANGE_RATES[toCurrency];
        }

        // Render dashboard
        function renderDashboard() {
            const content = document.getElementById('dashboardContent');
            const currency = document.getElementById('currencySelect').value;
            
            let html = '<div class="index-grid">';
            
            for (const data of allData) {
                const converted = convertAll(data, currency);
                const change = data.previousClose ? ((data.close - data.previousClose) / data.previousClose * 100) : 0;
                const changeClass = change >= 0 ? 'positive' : 'negative';
                const arrow = change >= 0 ? '▲' : '▼';
                
                html += `
                    <div class="index-card">
                        <div class="index-name">${data.country} ${data.name}</div>
                        <div class="index-symbol">${data.symbol}</div>
                        <div class="index-price">${formatNumber(converted.close, currency)}</div>
                        <div class="index-change ${changeClass}">
                            ${arrow} ${Math.abs(change).toFixed(2)}%
                        </div>
                        <div class="index-details">
                            <div>Open: ${formatNumber(converted.open, currency)}</div>
                            <div>High: ${formatNumber(converted.high, currency)}</div>
                            <div>Low: ${formatNumber(converted.low, currency)}</div>
                            <div>Volume: ${formatVolume(converted.volume)}</div>
                        </div>
                    </div>
                `;
            }
            
            html += '</div>';
            content.innerHTML = html;
        }

        // Convert all prices
        function convertAll(data, targetCurrency) {
            return {
                close: convertCurrency(data.close, data.currency, targetCurrency),
                open: convertCurrency(data.open, data.currency, targetCurrency),
                high: convertCurrency(data.high, data.currency, targetCurrency),
                low: convertCurrency(data.low, data.currency, targetCurrency),
                volume: data.volume,
            };
        }

        // Format number
        function formatNumber(value, currency) {
            const symbols = { 'USD': '$', 'EUR': '€', 'GBP': '£', 'JPY': '¥' };
            const symbol = symbols[currency] || '$';
            return symbol + value.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // Format volume
        function formatVolume(vol) {
            if (vol >= 1000000000) return (vol / 1000000000).toFixed(2) + 'B';
            if (vol >= 1000000) return (vol / 1000000).toFixed(2) + 'M';
            if (vol >= 1000) return (vol / 1000).toFixed(2) + 'K';
            return vol.toString();
        }

        // Setup compare checkboxes
        function setupCompareCheckboxes() {
            const container = document.getElementById('compareCheckboxes');
            let html = '';
            for (const [symbol, info] of Object.entries(INDEXES)) {
                html += `
                    <label class="compare-checkbox">
                        <input type="checkbox" value="${symbol}" ${symbol === '^GSPC' || symbol === '^IBEX' ? 'checked' : ''}>
                        ${info.country} ${info.name}
                    </label>
                `;
            }
            container.innerHTML = html;
        }

        // Compare selected indexes
        function compareSelected() {
            const checkboxes = document.querySelectorAll('#compareCheckboxes input:checked');
            const selected = Array.from(checkboxes).map(c => c.value);
            
            if (selected.length < 2) {
                alert('Please select at least 2 indexes to compare');
                return;
            }
            
            const currency = document.getElementById('currencySelect').value;
            const filtered = allData.filter(d => selected.includes(d.symbol));
            
            const results = document.getElementById('compareResults');
            let html = '<div class="compare-results">';
            
            for (const data of filtered) {
                const converted = convertAll(data, currency);
                const change = data.previousClose ? ((data.close - data.previousClose) / data.previousClose * 100) : 0;
                const changeClass = change >= 0 ? 'positive' : 'negative';
                
                html += `
                    <div class="compare-card">
                        <div class="index-name">${data.country} ${data.name}</div>
                        <div class="index-price">${formatNumber(converted.close, currency)}</div>
                        <div class="index-change ${changeClass}">
                            ${change >= 0 ? '▲' : '▼'} ${Math.abs(change).toFixed(2)}%
                        </div>
                        <div class="index-details">
                            <div>Open: ${formatNumber(converted.open, currency)}</div>
                            <div>High: ${formatNumber(converted.high, currency)}</div>
                            <div>Low: ${formatNumber(converted.low, currency)}</div>
                            <div>Volume: ${formatVolume(converted.volume)}</div>
                        </div>
                    </div>
                `;
            }
            
            html += '</div>';
            results.innerHTML = html;
            
            // Update chart
            updateChart(filtered, currency);
        }

        // Update comparison chart
        function updateChart(data, currency) {
            const ctx = document.getElementById('compareChart').getContext('2d');
            
            if (compareChart) {
                compareChart.destroy();
            }
            
            const labels = data.map(d => d.name);
            const values = data.map(d => convertCurrency(d.close, d.currency, currency));
            const changes = data.map(d => {
                return d.previousClose ? ((d.close - d.previousClose) / d.previousClose * 100) : 0;
            });
            
            compareChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Daily Change (%)',
                        data: changes,
                        backgroundColor: changes.map(c => c >= 0 ? '#4ade80' : '#f87171'),
                        borderColor: changes.map(c => c >= 0 ? '#22c55e' : '#dc2626'),
                        borderWidth: 1,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        title: {
                            display: true,
                            text: 'Daily Performance Comparison',
                            color: '#eaeaea',
                            font: { size: 16 }
                        }
                    },
                    scales: {
                        y: {
                            ticks: { color: '#a0a0a0' },
                            grid: { color: '#2a2a4a' }
                        },
                        x: {
                            ticks: { color: '#a0a0a0' },
                            grid: { color: '#2a2a4a' }
                        }
                    }
                }
            });
        }

        // Export to CSV
        function exportToCSV() {
            const currency = document.getElementById('currencySelect').value;
            const message = document.getElementById('exportMessage');
            
            let csv = 'Symbol,Name,Date,Close,Open,High,Low,Volume,Currency,Change %,Currency_Converted\n';
            
            for (const data of allData) {
                const converted = convertAll(data, currency);
                const change = data.previousClose ? ((data.close - data.previousClose) / data.previousClose * 100) : 0;
                csv += `${data.symbol},${data.name},${data.date},${converted.close.toFixed(2)},${converted.open.toFixed(2)},${converted.high.toFixed(2)},${converted.low.toFixed(2)},${data.volume},${currency},${change.toFixed(2)},Yes\n`;
            }
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `index_data_${targetDate}.csv`;
            a.click();
            URL.revokeObjectURL(url);
            
            message.innerHTML = `<div class="success">✅ CSV exported successfully!</div>`;
            setTimeout(() => message.innerHTML = '', 3000);
        }

        // Switch tabs
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        // Refresh data
        async function refreshData() {
            await loadAllData();
        }

        // Currency change handler
        document.getElementById('currencySelect').addEventListener('change', () => {
            renderDashboard();
            compareSelected();
        });

        // Initialize on load
        init();
    </script>
</body>
</html>
